server {
    listen 80;
    server_name student.my1409.ru;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name student.my1409.ru;

    ssl_certificate     /etc/letsencrypt/live/student.my1409.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/student.my1409.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/study1409;
    index login.html;

    # Статика напрямую (кэш на год)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API и всё остальное — на Flask
    location / {
        proxy_pass http://127.0.0.1:1090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }
}
