<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app.title.403">STUDY1409 — 403 Доступ запрещён</title>
    <link rel="icon" href="/static/favicon.png">
    <link rel="manifest" href="/static/manifest.json">
    <link href="/static/fonts/fonts.css" rel="stylesheet">
    <style>
        :root { --accent: #4446E1; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background:
                radial-gradient(ellipse 80% 60% at 30% 20%, rgba(220,53,69,0.3) 0%, transparent 50%),
                radial-gradient(ellipse 60% 50% at 70% 30%, rgba(68,70,225,0.25) 0%, transparent 50%);
            z-index: -1;
            animation: float 20s ease-in-out infinite;
        }
        @keyframes float {
            0%,100% { transform: translate(0,0) scale(1); }
            50%      { transform: translate(-3%, 5%) scale(0.98); }
        }
        .code {
            font-size: 80px;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #dc3545, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
        p {
            color: rgba(255,255,255,0.55);
            font-size: 14px;
            line-height: 1.6;
            max-width: 300px;
            margin-bottom: 32px;
        }
        .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 13px 26px;
            border: none;
            border-radius: 14px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity .2s;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-secondary { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.15); }
        .btn:hover { opacity: .82; }
    </style>
    <script src="/static/i18n/i18n.js?v=2"></script>
</head>
<body>
    <div class="code">403</div>
    <h1 data-i18n="error.403.title">Доступ запрещён</h1>
    <p data-i18n="error.403.desc">У тебя нет прав для просмотра этой страницы. Войди в аккаунт или обратись к администратору.</p>
    <div class="actions">
        <a data-i18n="error.403.login" href="/" class="btn btn-primary">Войти</a>
        <a data-i18n="error.403.back" href="javascript:history.back()" class="btn btn-secondary">Назад</a>
    </div>
</body>
</html>
