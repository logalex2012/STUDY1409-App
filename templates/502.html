<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDY1409 — my1409.ru недоступен</title>
    <link rel="icon" href="/static/favicon.png">
    <link rel="manifest" href="/static/manifest.json">
    <link href="/static/fonts/fonts.css" rel="stylesheet">
    <style>
        :root { --accent: #4446E1; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background:
                radial-gradient(ellipse 80% 60% at 30% 20%, rgba(255,140,0,0.22) 0%, transparent 50%),
                radial-gradient(ellipse 60% 50% at 70% 30%, rgba(255,193,7,0.18) 0%, transparent 50%);
            z-index: -1;
            animation: float 20s ease-in-out infinite;
        }
        @keyframes float {
            0%,100% { transform: translate(0,0) scale(1); }
            50%      { transform: translate(-3%, 5%) scale(0.98); }
        }

        /* Анимированный пульс сигнала */
        .signal-wrap {
            position: relative;
            width: 72px;
            height: 72px;
            margin: 0 auto 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .signal-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(255,193,7,0.4);
            animation: ping 2s ease-out infinite;
        }
        .signal-ring:nth-child(1) { width: 72px; height: 72px; animation-delay: 0s; }
        .signal-ring:nth-child(2) { width: 52px; height: 52px; animation-delay: 0.4s; }
        .signal-ring:nth-child(3) { width: 32px; height: 32px; animation-delay: 0.8s; }
        @keyframes ping {
            0%   { transform: scale(0.9); opacity: 0.8; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        .signal-icon {
            font-size: 28px;
            position: relative;
            z-index: 1;
        }

        .code {
            font-size: 72px;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #ffc107, #ff9800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 14px;
        }
        h1 { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
        p {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            line-height: 1.6;
            max-width: 300px;
            margin: 0 auto 28px;
        }
        .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 13px 26px;
            border: none;
            border-radius: 14px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity .2s;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-secondary { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.15); }
        .btn:hover { opacity: .82; }

        .retry-hint {
            margin-top: 24px;
            font-size: 12px;
            color: rgba(255,255,255,0.25);
        }
        #countdown { color: rgba(255,193,7,0.6); }
    </style>
</head>
<body>
    <div class="signal-wrap">
        <div class="signal-ring"></div>
        <div class="signal-ring"></div>
        <div class="signal-ring"></div>
        <span class="signal-icon">📡</span>
    </div>

    <div class="code">502</div>
    <h1>my1409.ru недоступен</h1>
    <p>Сервер школы временно не отвечает. Это не ошибка приложения — попробуй чуть позже.</p>

    <div class="actions">
        <button class="btn btn-primary" onclick="location.reload()">↻ Попробовать снова</button>
        <a href="/apps" class="btn btn-secondary">На главную</a>
    </div>

    <p class="retry-hint">Автоматическая проверка через <span id="countdown">20</span> сек</p>

    <script>
        let t = 20;
        const el = document.getElementById('countdown');
        const timer = setInterval(() => {
            if (document.hidden) return;
            t--;
            if (el) el.textContent = t;
            if (t <= 0) { clearInterval(timer); location.reload(); }
        }, 1000);
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) clearInterval(timer);
        });
    </script>
</body>
</html>
