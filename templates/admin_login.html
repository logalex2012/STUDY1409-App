<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app.title.admin_login">STUDY1409 — Вход для администратора</title>
    <link rel="icon" href="/s/favicon.png?v=1">
    <link href="/s/fonts/fonts.css?v=1" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background:
                radial-gradient(ellipse 80% 60% at 30% 20%, rgba(68,70,225,0.35) 0%, transparent 50%),
                radial-gradient(ellipse 60% 50% at 70% 30%, rgba(220,53,69,0.3) 0%, transparent 50%);
            z-index: 0;
            animation: cloudFloat 20s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: fixed;
            top: -30%; left: -30%;
            width: 160%; height: 160%;
            background:
                radial-gradient(ellipse 50% 40% at 60% 25%, rgba(100,102,255,0.25) 0%, transparent 45%),
                radial-gradient(ellipse 40% 35% at 40% 35%, rgba(255,80,100,0.2) 0%, transparent 40%);
            z-index: 0;
            animation: cloudFloat2 25s ease-in-out infinite reverse;
        }

        @keyframes cloudFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(5%, 3%) scale(1.05); }
            50% { transform: translate(-3%, 5%) scale(0.98); }
            75% { transform: translate(-5%, -2%) scale(1.02); }
        }

        @keyframes cloudFloat2 {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(-4%, 4%) rotate(2deg); }
            66% { transform: translate(4%, -3%) rotate(-2deg); }
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 28px;
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .shield {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .sub {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 28px;
        }

        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-family: 'Montserrat', sans-serif;
            margin-bottom: 14px;
            transition: border-color 0.2s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #4446E1;
        }

        input::placeholder { color: rgba(255,255,255,0.35); }

        .error {
            background: rgba(220,53,69,0.18);
            border: 1px solid rgba(220,53,69,0.4);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.85rem;
            color: #ff8080;
            margin-bottom: 14px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4446E1 0%, #2E3192 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(68,70,225,0.4);
        }
    </style>
    <script src="/s/i18n/i18n.js?v=2"></script>
</head>
<body>
    <div class="card">
        <div class="shield">🛡️</div>
        <h1 data-i18n="admin_login.title">Панель администратора</h1>
        <p class="sub" data-i18n="admin_login.subtitle">STUDY1409 · Только для сотрудников</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="password" name="password" placeholder="Пароль" data-i18n="admin_login.password_placeholder" data-i18n-placeholder="true" autofocus required>
            <button data-i18n="admin_login.login" type="submit">Войти</button>
        </form>
    </div>
</body>
</html>
