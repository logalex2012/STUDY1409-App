<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app.title.application_404">STUDY1409 - Разрешение не найдено</title>
    <link rel="icon" href="/s/favicon.png">
    <link rel="manifest" href="/s/manifest.json">
    <link href="/s/fonts/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="/s/lib/font-awesome/custom.css">
    <script src="/s/lib/lucide.min.js"></script>
    <script src="/s/tg.js"></script>
    <script src="/s/i18n/i18n.js?v=2"></script>
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: rgba(255, 255, 255, 0.08);
            --bg-tertiary: rgba(255, 255, 255, 0.06);
            --bg-hover: rgba(255, 255, 255, 0.12);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
            --border-color: rgba(255, 255, 255, 0.12);
            --border-light: rgba(255, 255, 255, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --cloud1-color1: rgba(68, 70, 225, 0.4);
            --cloud1-color2: rgba(220, 53, 69, 0.35);
            --cloud2-color1: rgba(100, 102, 255, 0.3);
            --cloud2-color2: rgba(255, 80, 100, 0.25);
            --shadow-color: rgba(0, 0, 0, 0.3);
            --accent: #4446E1;
        }

        [data-theme="light"] {
            --bg-primary: #f5f7fa;
            --bg-secondary: rgba(255, 255, 255, 0.9);
            --bg-tertiary: rgba(255, 255, 255, 0.95);
            --bg-hover: rgba(255, 255, 255, 1);
            --text-primary: #1a1a2e;
            --text-secondary: rgba(26, 26, 46, 0.7);
            --text-muted: rgba(26, 26, 46, 0.5);
            --border-color: rgba(0, 0, 0, 0.08);
            --border-light: rgba(0, 0, 0, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.1);
            --cloud1-color1: rgba(68, 70, 225, 0.8);
            --cloud1-color2: rgba(220, 53, 69, 0.75);
            --cloud2-color1: rgba(100, 102, 255, 0.7);
            --cloud2-color2: rgba(255, 80, 100, 0.65);
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background:
                radial-gradient(ellipse 80% 60% at 30% 20%, var(--cloud1-color1) 0%, transparent 50%),
                radial-gradient(ellipse 60% 50% at 70% 30%, var(--cloud1-color2) 0%, transparent 50%);
            z-index: -1;
            animation: cloudFloat 20s ease-in-out infinite;
            transition: background 0.3s ease;
        }

        body::after {
            content: '';
            position: fixed;
            top: -30%; left: -30%;
            width: 160%; height: 160%;
            background:
                radial-gradient(ellipse 50% 40% at 60% 25%, var(--cloud2-color1) 0%, transparent 45%),
                radial-gradient(ellipse 40% 35% at 40% 35%, var(--cloud2-color2) 0%, transparent 40%);
            z-index: -1;
            animation: cloudFloat2 25s ease-in-out infinite reverse;
            transition: background 0.3s ease;
        }

        @keyframes cloudFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(5%, 3%) scale(1.05); }
            50% { transform: translate(-3%, 5%) scale(0.98); }
            75% { transform: translate(-5%, -2%) scale(1.02); }
        }

        @keyframes cloudFloat2 {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(-4%, 4%) rotate(2deg); }
            66% { transform: translate(4%, -3%) rotate(-2deg); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            padding: 1rem;
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 40px;
            animation: fadeInUp 0.6s ease-out;
        }

        .top-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 1.5rem;
            align-items: stretch;
        }

        .nav-close {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .card {
            background: var(--bg-tertiary);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 10px 30px var(--shadow-color);
            margin-bottom: 20px;
            text-align: center;
        }

        .error-icon {
            color: #ff4d4d;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(255, 77, 77, 0.4));
        }

        .error-icon svg {
            width: 80px !important;
            height: 80px !important;
            stroke-width: 1.5;
        }

        .title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .hint {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 28px;
        }

        .rating-block {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: 18px;
            padding: 20px;
        }

        .rating-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .stars {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .star {
            font-size: 1.8rem;
            color: var(--border-light);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .star.active {
            color: #ffd700;
            filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.5));
        }

        /* Popup */
        .popup-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .popup {
            background: var(--bg-tertiary);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            padding: 30px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .popup h3 { font-size: 1.1rem; margin-bottom: 10px; }
        .popup p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 20px; line-height: 1.5; }

        .popup-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 13px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 0.9rem;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .popup-btn.primary { background: linear-gradient(135deg, #4446E1, #2E3192); color: white; }
        .popup-btn.primary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(68,70,225,0.4); }
        .popup-btn.secondary { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-light); }

        @media (max-width: 480px) {
            .container { padding: 0.8rem; }
            .card { padding: 24px 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-nav">
            <a href="/create_application" class="nav-close" title="Назад" data-i18n="application.back">
                <i data-lucide="arrow-left"></i>
            </a>
        </div>

        <div class="card">
            <div class="error-icon">
                <i data-lucide="shield-alert"></i>
            </div>

            <div class="title" data-i18n="app404.title">Разрешение больше не действует</div>
            <div class="subtitle" data-i18n="app404.subtitle">Оно уже использовано или отменено</div>
            <div class="hint" data-i18n="app404.hint">Если считаете, что это ошибка — обратитесь к учителю.</div>

            <div class="rating-block">
                <div class="rating-title" data-i18n="app404.rating_title">Как всё прошло?</div>
                <div class="stars">
                    <i class="fa-solid fa-star star" data-rating="1"></i>
                    <i class="fa-solid fa-star star" data-rating="2"></i>
                    <i class="fa-solid fa-star star" data-rating="3"></i>
                    <i class="fa-solid fa-star star" data-rating="4"></i>
                    <i class="fa-solid fa-star star" data-rating="5"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="popup-overlay" id="popupOverlay">
        <div class="popup">
            <h3 data-i18n="app404.popup_title">Спасибо за оценку!</h3>
            <p id="popupText"></p>
            <button class="popup-btn primary" onclick="openSurvey()" data-i18n="app404.survey">
                <i data-lucide="clipboard-list" style="width:16px;height:16px;"></i>
                Пройти быстрый опрос
            </button>
            <button class="popup-btn secondary" onclick="closePopup()" data-i18n="app404.close">Закрыть</button>
        </div>
    </div>

    <script>
        function initTheme() {
            const saved = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
        }
        initTheme();
        lucide.createIcons();

        const messages = {
            1: __('app404.rating_1'),
            2: __('app404.rating_2'),
            3: __('app404.rating_3'),
            4: __('app404.rating_4'),
            5: __('app404.rating_5')
        };

        document.querySelectorAll('.star').forEach(star => {
            star.addEventListener('click', () => {
                const rating = star.dataset.rating;
                document.querySelectorAll('.star').forEach(s => {
                    s.classList.toggle('active', s.dataset.rating <= rating);
                });
                document.getElementById('popupText').textContent = messages[rating];
                document.getElementById('popupOverlay').style.display = 'flex';
            });
        });

        function openSurvey() {
            window.location.href = 'https://docs.google.com/forms/d/e/1FAIpQLSdi09W1VvhGlAm_BsLjsaQ6qszMFM-9yPk7yz-1AouTrYFN6Q/viewform?usp=sf_link';
        }

        function closePopup() {
            document.getElementById('popupOverlay').style.display = 'none';
        }

        document.getElementById('popupOverlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closePopup();
        });

        initTelegramWebApp({ backButton: true });
    </script>
</body>
</html>
