<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STUDY1409 - Авторизация</title>

<link rel="icon" href="/static/favicon.png">
<link href="/static/fonts/fonts.css" rel="stylesheet">

<style>
:root {
    --bg-primary: #000;
    --glass-bg: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.15);
    --text-primary: #fff;
    --text-secondary: rgba(255,255,255,0.7);
    --accent: #4446E1;
    --accent-hover: #5a5cf5;

    --cloud1-color1: rgba(68, 70, 225, 0.4);
    --cloud1-color2: rgba(220, 53, 69, 0.35);
}

[data-theme="light"] {
    --bg-primary: #f5f7fa;
    --glass-bg: rgba(255,255,255,0.8);
    --glass-border: rgba(0,0,0,0.1);
    --text-primary: #1a1a2e;
    --text-secondary: rgba(26,26,46,0.7);
    --accent: #4446E1;
    --accent-hover: #3335c8;
    --cloud1-color1: rgba(68,70,225,0.5);
    --cloud1-color2: rgba(220,53,69,0.4);
}

[data-theme="light"] .card input {
    background: rgba(0,0,0,0.05);
    border-color: rgba(0,0,0,0.12);
    color: #1a1a2e;
}

[data-theme="light"] .card input::placeholder { color: rgba(26,26,46,0.4); }

[data-theme="stranger"] {
    --bg-primary: #050005;
    --glass-bg: rgba(180,0,15,0.12);
    --glass-border: rgba(220,20,20,0.45);
    --text-primary: #ffffff;
    --text-secondary: rgba(255,160,160,0.85);
    --accent: #cc1500;
    --accent-hover: #a81000;
    --cloud1-color1: rgba(210,0,15,0.6);
    --cloud1-color2: rgba(100,0,140,0.5);
}

[data-theme="stranger"] .card h1 {
    font-family: 'Special Elite', cursive;
    text-shadow: 0 0 12px rgba(220,20,20,0.9), 0 0 35px rgba(200,0,10,0.4);
}

[data-theme="stranger"] .card {
    box-shadow: 0 0 25px rgba(200,0,20,0.25), 0 20px 50px rgba(0,0,0,0.8);
    border-color: rgba(200,0,20,0.35);
}

#stParticles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    display: none;
}
[data-theme="stranger"] #stParticles { display: block; }

.card { position: relative; z-index: 1; }

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Montserrat', sans-serif;
}

body {
    background: var(--bg-primary);
    min-height: 100vh;
    color: var(--text-primary);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
}

body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background:
        radial-gradient(
            ellipse 80% 60% at 30% 20%,
            var(--cloud1-color1) 0%,
            transparent 50%
        ),
        radial-gradient(
            ellipse 60% 50% at 70% 30%,
            var(--cloud1-color2) 0%,
            transparent 50%
        );
    z-index: -1;
    animation: cloudFloat 20s ease-in-out infinite;
}

@keyframes cloudFloat {
    0%,100% {
        transform: translate(0,0) scale(1);
    }
    25% {
        transform: translate(5%,3%) scale(1.05);
    }
    50% {
        transform: translate(-3%,5%) scale(0.98);
    }
    75% {
        transform: translate(-5%,-2%) scale(1.02);
    }
}

.card {
    width: 100%;
    max-width: 420px;
    padding: 35px;
    border-radius: 24px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,.4);
}

.card h1 {
    margin-bottom: 8px;
    font-size: 26px;
}

.card .sub {
    color: var(--text-secondary);
    font-size: 14px;
    margin-bottom: 28px;
}

.card input {
    width: 100%;
    padding: 15px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.15);
    background: rgba(255,255,255,.05);
    color: white;
    font-size: 15px;
    font-family: 'Montserrat', sans-serif;
    outline: none;
    margin-bottom: 14px;
    transition: border-color .2s;
}

.card input:focus { border-color: var(--accent); }
.card input::placeholder { color: rgba(255,255,255,.5); }

.card button {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 14px;
    background: var(--accent);
    color: white;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Montserrat', sans-serif;
    cursor: pointer;
    transition: .3s;
}

.card button:hover:not(:disabled) {
    background: var(--accent-hover);
    transform: translateY(-2px);
}

.card button:disabled { opacity: .6; cursor: not-allowed; }

.back-btn {
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 13px;
    font-family: 'Montserrat', sans-serif;
    cursor: pointer;
    margin-top: 12px;
    text-decoration: underline;
}

.error-msg {
    background: rgba(220,53,69,.15);
    border: 1px solid rgba(220,53,69,.35);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    color: #ff8080;
    margin-bottom: 14px;
    display: none;
}

.step { display: none; }
.step.active { display: block; }

footer {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--text-secondary);
    font-size: 13px;
}
</style>
    <script src="https://telegram.org/js/telegram-web-app.js" async></script>
    <script src="/static/tg.js"></script>
</head>

<body>

<canvas id="stParticles"></canvas>
<div class="card">
    <div class="error-msg" id="errMsg"></div>

    <!-- Шаг 1: телефон -->
    <div class="step active" id="step1">
        <h1>Привет 👋</h1>
        <p class="sub">Войдите в STUDY1409 по номеру телефона</p>
        <input type="tel" id="phoneInput" placeholder="+7 (999) 000-00-00" autocomplete="tel">
        <button id="sendBtn" onclick="sendCode()">Получить код</button>
    </div>

    <!-- Шаг 2: код -->
    <div class="step" id="step2">
        <h1>Введите код 🔑</h1>
        <p class="sub" id="codeSub">Код отправлен в Telegram на ваш номер</p>
        <input type="number" id="codeInput" placeholder="0000" maxlength="4" autocomplete="one-time-code">
        <button id="verifyBtn" onclick="verifyCode()">Войти</button>
        <button class="back-btn" onclick="backToPhone()">← Изменить номер</button>
    </div>
</div>

<footer>
    Создано в школе №1409
</footer>

<script>
    (function initTheme() {
        const saved = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', saved);
    })();

    let _phone = '';

    function showError(msg) {
        const el = document.getElementById('errMsg');
        el.textContent = msg;
        el.style.display = msg ? 'block' : 'none';
    }

    function setStep(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
        showError('');
    }

    async function sendCode() {
        const phone = document.getElementById('phoneInput').value.trim();
        if (!phone) { showError('Введите номер телефона'); return; }
        _phone = phone;
        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        btn.textContent = 'Отправляем…';
        try {
            const r = await fetch('/api/pwa/login/send-code', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({phone})
            });
            const data = await r.json();
            if (r.ok && data.status === 'success') {
                document.getElementById('codeSub').textContent =
                    `Код отправлен в Telegram на номер ${phone}`;
                setStep(2);
                setTimeout(() => document.getElementById('codeInput').focus(), 100);
            } else {
                showError(data.message || 'Ошибка отправки кода');
            }
        } catch {
            showError('Нет соединения с сервером');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Получить код';
        }
    }

    async function verifyCode() {
        const code = document.getElementById('codeInput').value.trim();
        if (!code) { showError('Введите код'); return; }
        const btn = document.getElementById('verifyBtn');
        btn.disabled = true;
        btn.textContent = 'Проверяем…';
        try {
            const r = await fetch('/api/pwa/login/verify-code', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({phone: _phone, code})
            });
            const data = await r.json();
            if (r.ok && data.status === 'success') {
                window.location.href = '/apps';
            } else {
                showError(data.message || 'Неверный код');
                btn.disabled = false;
                btn.textContent = 'Войти';
            }
        } catch {
            showError('Нет соединения с сервером');
            btn.disabled = false;
            btn.textContent = 'Войти';
        }
    }

    function backToPhone() { setStep(1); }

    // Enter key support
    document.addEventListener('keydown', e => {
        if (e.key !== 'Enter') return;
        if (document.getElementById('step1').classList.contains('active')) sendCode();
        else verifyCode();
    });

    (function initParticles() {
        const canvas = document.getElementById('stParticles');
        const ctx = canvas.getContext('2d');
        let animId;
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);
        const pts = Array.from({length: 70}, () => ({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            r: Math.random() * 1.8 + 0.4,
            vx: (Math.random() - 0.5) * 0.25,
            vy: -(Math.random() * 0.4 + 0.05),
            a: Math.random() * 0.45 + 0.1
        }));
        function tick() {
            animId = requestAnimationFrame(tick);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const isStranger = document.documentElement.getAttribute('data-theme') === 'stranger';
            const particlesOn = localStorage.getItem('st_particles') !== 'false';
            if (!isStranger || !particlesOn) return;
            pts.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,180,180,${p.a})`;
                ctx.fill();
                p.x += p.vx; p.y += p.vy;
                if (p.y < -10) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; }
                if (p.x < -10) p.x = canvas.width + 10;
                if (p.x > canvas.width + 10) p.x = -10;
            });
        }
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && animId) {
                cancelAnimationFrame(animId);
                animId = null;
            } else if (!document.hidden && !animId) {
                tick();
            }
        });
        tick();
    })();

    // Telegram Web App: на странице входа кнопку «назад» не показываем
    initTelegramWebApp({ backButton: false });
</script>
</body>
</html>
