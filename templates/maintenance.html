<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app.title.maintenance">STUDY1409 — Технические работы</title>
    <link rel="icon" href="/static/favicon.png">
    <link rel="manifest" href="/static/manifest.json">
    <link href="/static/fonts/fonts.css" rel="stylesheet">
    <style>
        :root { --accent: #4446E1; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background:
                radial-gradient(ellipse 80% 60% at 30% 20%, rgba(68,70,225,0.35) 0%, transparent 50%),
                radial-gradient(ellipse 60% 50% at 70% 30%, rgba(220,53,69,0.28) 0%, transparent 50%);
            z-index: -1;
            animation: float 20s ease-in-out infinite;
        }
        @keyframes float {
            0%,100% { transform: translate(0,0) scale(1); }
            25%      { transform: translate(4%, 2%) scale(1.03); }
            75%      { transform: translate(-4%, 3%) scale(0.97); }
        }

        /* Gear animation */
        .gear-wrap {
            position: relative;
            width: 96px;
            height: 96px;
            margin: 0 auto 28px;
        }
        .gear-wrap svg { width: 100%; height: 100%; }
        .gear-outer { animation: spinCW  8s linear infinite; transform-origin: center; }
        .gear-inner { animation: spinCCW 5s linear infinite; transform-origin: center; }
        @keyframes spinCW  { to { transform: rotate(360deg);  } }
        @keyframes spinCCW { to { transform: rotate(-360deg); } }

        h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
        .subtitle {
            font-size: 15px;
            color: rgba(255,255,255,0.65);
            margin-bottom: 8px;
            line-height: 1.55;
            max-width: 320px;
        }
        .eta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(68,70,225,0.18);
            border: 1px solid rgba(68,70,225,0.35);
            border-radius: 30px;
            padding: 8px 18px;
            font-size: 13px;
            font-weight: 600;
            color: #9a9dff;
            margin: 20px 0 32px;
        }
        .eta-dot {
            width: 7px; height: 7px;
            background: #4446E1;
            border-radius: 50%;
            animation: pulse 1.4s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.4; transform: scale(0.7); }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 13px 26px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background .2s;
        }
        .btn:hover { background: rgba(255,255,255,0.14); }

        .countdown {
            font-size: 13px;
            color: rgba(255,255,255,0.3);
            margin-top: 20px;
        }
    </style>
    <script src="/static/i18n/i18n.js?v=2"></script>
</head>
<body>
    <!-- Animated gears -->
    <div class="gear-wrap">
        <svg viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Outer gear -->
            <g class="gear-outer">
                <path fill="rgba(68,70,225,0.5)" d="
                    M48 14 L52 6 L44 6 Z
                    M48 82 L52 90 L44 90 Z
                    M14 48 L6 52 L6 44 Z
                    M82 48 L90 52 L90 44 Z
                    M24.5 20.5 L19 13 L13 19 Z
                    M71.5 75.5 L77 83 L83 77 Z
                    M20.5 71.5 L13 77 L19 83 Z
                    M75.5 24.5 L83 19 L77 13 Z
                "/>
                <circle cx="48" cy="48" r="28" stroke="rgba(68,70,225,0.6)" stroke-width="6" fill="none"/>
            </g>
            <!-- Inner gear -->
            <g class="gear-inner">
                <circle cx="48" cy="48" r="14" fill="rgba(68,70,225,0.25)" stroke="rgba(100,102,255,0.7)" stroke-width="4"/>
                <circle cx="48" cy="48" r="5" fill="rgba(100,102,255,0.9)"/>
            </g>
        </svg>
    </div>

    <h1 data-i18n="maintenance.title">Технические работы</h1>
    <p class="subtitle" data-i18n="maintenance.desc">Мы обновляем приложение. Совсем скоро всё заработает — обычно это занимает не больше нескольких минут.</p>

    <div class="eta">
        <span class="eta-dot"></span>
        <span data-i18n="maintenance.eta">Скоро вернёмся</span>
    </div>

    <button data-i18n="maintenance.check_again" class="btn" onclick="location.reload()">↻ Проверить снова</button>

    <p class="countdown" id="autoRefresh"><span data-i18n="maintenance.auto_refresh">Автообновление через</span> <span id="countdown">30</span> <span data-i18n="maintenance.sec">сек</span></p>

    <script>
        let t = 30;
        const el = document.getElementById('countdown');
        const timer = setInterval(() => {
            if (document.hidden) return;
            t--;
            if (el) el.textContent = t;
            if (t <= 0) { clearInterval(timer); location.reload(); }
        }, 1000);
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) clearInterval(timer);
        });
    </script>
</body>
</html>
